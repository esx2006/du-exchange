<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شركة دو للصرافة</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#f4f7ff;
color:#111;
}

header{
background:linear-gradient(135deg,#0d6efd,#0a58ca);
color:white;
padding:25px 15px;
text-align:center;
position:relative;
box-shadow:0 5px 15px rgba(0,0,0,.15);
<button id="adminBtn" onclick="openLogin()">⚙️</button>
}

.logo{
width:85px;
height:85px;
background:white;
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
color:#0d6efd;
font-weight:bold;
font-size:14px;
}

#adminBtn{
position:absolute;
right:12px;
top:12px;
background:rgba(255,255,255,0.9);
color:#0d6efd;
border:none;
width:38px;
height:38px;
border-radius:10px;
cursor:pointer;
font-size:16px;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
transition:0.2s;
}

#adminBtn:hover{
transform:scale(1.05);
}
table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

th{
background:#0d6efd;
color:white;
padding:14px;
font-size:15px;
}

td{
text-align:center;
padding:12px;
border-bottom:1px solid #eee;
font-size:14px;
}

tr:hover{
background:#f0f6ff;
transition:0.2s;
}

.up{color:#198754;font-weight:bold}
.down{color:#dc3545;font-weight:bold}

footer{
text-align:center;
padding:20px;
margin-top:20px;
background:white;
font-size:14px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:white;
padding:20px;
border-radius:12px;
width:92%;
max-width:520px;
max-height:80vh;
overflow:auto;
animation:pop 0.2s ease-in-out;
}

@keyframes pop{
from{transform:scale(0.9);opacity:0}
to{transform:scale(1);opacity:1}
}

input{
width:100%;
padding:10px;
margin:6px 0;
border:1px solid #ddd;
border-radius:8px;
outline:none;
}

button{
background:#0d6efd;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
width:100%;
margin-top:8px;
font-weight:bold;
}

button:hover{opacity:0.9}

.small{
font-size:12px;
color:#666;
margin-top:5px;
}

</style>
</head>

<body>

<header>

<button id="adminBtn" onclick="openLogin()">⚙ Admin</button>

<div class="logo">DO</div>
<h2>شركة دو للصرافة</h2>
<p>أسعار العملات مباشرة لحظة بلحظة</p>

</header>

<div class="container">

<table>
<thead>
<tr>
<th>العملة</th>
<th>شراء</th>
<th>بيع</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<footer>
📞 0999999999 | 📱 0987654321<br>
فيسبوك | إنستغرام
</footer>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<div class="modal-content">
<h3>تسجيل الدخول</h3>
<input type="password" id="pass" placeholder="كلمة المرور">
<button onclick="checkPass()">دخول</button>
<p class="small">لوحة الإدارة خاصة بالمسؤول فقط</p>
</div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
<div class="modal-content">
<h3>لوحة الإدارة</h3>
<div id="adminArea"></div>

<button onclick="saveAll()" style="margin-top:15px">
💾 حفظ التعديلات
</button>
</div>
</div>

<script>

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyARLbs7TqhKmyaHFM-fBahuyonvbZA6m94",
  authDomain: "du-exchange-e34f0.firebaseapp.com",
  projectId: "du-exchange-e34f0",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
  let tempData = {};

// كلمة السر
const PASSWORD = "1234";

// تحميل العملات
async function load(){
const snap = await db.collection("currencies").get();
const table = document.getElementById("table");
table.innerHTML="";

snap.forEach(doc=>{
const c = doc.data();

table.innerHTML += `
<tr>
<td>${c.name}</td>
<td class="up">${c.buy}</td>
<td class="down">${c.sell}</td>
</tr>`;
});
}

// فتح تسجيل الدخول
function openLogin(){
document.getElementById("loginModal").style.display="flex";
}

// تحقق كلمة السر
function checkPass(){
let p = document.getElementById("pass").value;
if(p === PASSWORD){
document.getElementById("loginModal").style.display="none";
openAdmin();
}else{
alert("كلمة المرور غير صحيحة");
}
}

// لوحة الإدارة
async function openAdmin(){
document.getElementById("adminModal").style.display="flex";

const snap = await db.collection("currencies").get();
const area = document.getElementById("adminArea");

area.innerHTML="";
tempData = {};

snap.forEach(doc=>{
const c = doc.data();

// نخزن نسخة مؤقتة
tempData[doc.id] = {
name: c.name,
buy: c.buy,
sell: c.sell
};

// عرض في الادمن
area.innerHTML += `
<div style="margin-bottom:15px">
<b>${c.name}</b>

<input value="${c.buy}" 
onchange="tempData['${doc.id}'].buy = Number(this.value)">

<input value="${c.sell}" 
onchange="tempData['${doc.id}'].sell = Number(this.value)">
</div>
`;
});
}

// تحديث سعر
function update(id,field,value){
db.collection("currencies").doc(id).update({
[field]: Number(value)
});
}

// تشغيل
load();
async function saveAll(){

for(let id in tempData){
await db.collection("currencies").doc(id).update({
buy: tempData[id].buy,
sell: tempData[id].sell
});
}

alert("تم حفظ التعديلات بنجاح ✅");
load();
}
</script>

</body>
</html>
